		<style>
			/* Memaksa pembagian ubin pas 50% di tengah pada layar desktop */
			#two.tiles {
				display: flex !important;
				flex-wrap: wrap !important;
			}
			#two.tiles article {
				width: 50% !important;
				max-width: 50% !important;
				min-width: 50% !important;
			}
			/* Membuat teks "Fluida Statis" & "Fluida Dinamis" berada tepat di tengah-tengah ubin */
			#two.tiles article .major {
				padding: 0 !important;
				top: 50% !important;
				left: 50% !important;
				transform: translate(-50%, -50%) !important;
				margin: 0 !important;
				width: 100% !important;
				text-align: center !important;
			}
			/* Menghilangkan efek garis bawah bawaan template agar teks lebih bersih di tengah */
			#two.tiles article .major h3 a::after {
				display: none !important;
			}
			/* Agar tampilan tetap responsif dan otomatis menumpuk ke bawah saat dibuka di HP */
			@media screen and (max-width: 768px) {
				#two.tiles article {
					width: 100% !important;
					max-width: 100% !important;
					min-width: 100% !important;
				}
			}
		</style>
